<div class="hero-card">

  <div class="hero-top">
    <div class="hero-left">
      <div class="meta">
        <app-wine-type-badge [type]="bottle().type" />
        <span class="vintage">{{ bottle().vintage }}</span>
      </div>
      <h1 class="name">{{ bottle().name }}</h1>
      <div class="designation">{{ bottle().appellation }}</div>
    </div>

    @if (bottle().score) {
      <div class="score">
        <div class="score-value">{{ bottle().score }}</div>
        <div class="score-label">pts</div>
      </div>
    }
  </div>

  <div class="stats">
    <app-stat-cell label="En cave" [value]="'×' + bottle().quantity" color="#3D7A58" [border]="true" />
    <app-stat-cell label="Prix / btl." [value]="bottle().price ? bottle().price + ' €' : '—'" color="#C4522A" [border]="true" />
    <app-stat-cell label="Millésime" [value]="bottle().vintage.toString()" color="#A67C2E" />
  </div>

</div>
