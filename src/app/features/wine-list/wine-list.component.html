<div class="wine-list">

  <!-- Hero -->
  <div class="hero">
    <div class="hero-left">
      <div class="hero-eyebrow">Cave personnelle</div>
      <h1 class="hero-title">Mes <span>bouteilles</span></h1>
    </div>
    <div class="hero-stats">
      <app-stat-cell label="Bouteilles" [value]="totalBottles.toString()" color="#C4522A" [border]="true" />
      <app-stat-cell label="Appellations" [value]="totalAppellations.toString()" color="#3D7A58" [border]="true" />
      <app-stat-cell label="Millésimes" [value]="totalVintages.toString()" color="#A67C2E" />
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="filters">
      <button class="filter-pill" [class.active]="selectedType() === null" (click)="filterByType(null)">All</button>
      <button
        *ngFor="let t of types"
        class="filter-pill"
        [class.active]="selectedType() === t.value"
        [ngClass]="t.value.toLowerCase()"
        (click)="filterByType(t.value)">
        {{ t.label }}
      </button>
    </div>
    <div class="search-wrapper">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
        <circle cx="5.5" cy="5.5" r="4.5" stroke="#A89880" stroke-width="1.2"/>
        <path d="M9 9l2.5 2.5" stroke="#A89880" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      <input class="search" placeholder="Rechercher une bouteille…" (input)="onSearch($event)" />
    </div>
  </div>

  <!-- Grid -->
  <div class="grid-section">
    <div class="grid">
      <app-wine-card
        *ngFor="let bottle of filteredBottles()"
        [bottle]="bottle"
        (clicked)="onCardClick($event)" />
      <div class="add-card" (click)="onAddClick()">
        <div class="add-icon">+</div>
        <span class="add-label">Ajouter une bouteille</span>
      </div>
    </div>
  </div>

</div>
